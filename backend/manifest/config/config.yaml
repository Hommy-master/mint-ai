server:
  addr: "0.0.0.0:50000"
  # API文档
  openApiPath: "/openapi/api.json"
  swaggerPath: "/openapi/doc"
  clientMaxBodySize: "100MB" # 客户端提交的Body大小限制, 同时也影响文件上传大小
  # 服务器日志配置，如服务启动，用户访问记录等
  logger: # 自定义logger配置, 覆盖全局logger配置
    path: "/app/server-logs/"
    stdout: true # 日志是否同时输出到终端

# 开发日志，代码中使用glog输出的日志
logger:
  path: "/app/logs/" # 日志文件目录, 如果为空, 表示不记录到文件; 建议目录和server.logPath保持一致
  level: "DEV" # 取值：DEV: 开发模式, PROD: 生产模式
  stdout: true # 日志是否同时输出到终端. 默认true
  rotateExpire: "24h" # 多长时间切分一次日志
  rotateBackupExpire: "240h" # 删除超过多长时间的切分文件, 默认为0, 表示不备份, 切分则删除. 如果启用按时间备份, rotateBackupLimit 必须设置为一个相对较大的数
  rotateBackupLimit: 5 # 最多保留多少个切分文件, 但rotateBackupExpire的配置优先. 默认为0, 表示不备份, 切分则删除. 可以不设置rotateBackupExpire
  rotateBackupCompress: 9 # 压缩等级，默认为9，取值范围0-9，0表示不压缩，9表示最高压缩

ffmpeg:
  # 临时目录，用于存储ffmpeg转换的临时文件
  workspace: "/tmp/ffmpeg"
  # 上传目录
  uploadOutput: "/app/output/upload"
  # 智能存放目录
  bots: "/app/output/bots"
  