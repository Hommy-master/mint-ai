# 非敏感默认项见下文；密钥等见同目录 .env（可复制 .env.example 为 .env）
# 启动（在 docker 目录下）：docker compose up -d
# 或在仓库根目录：docker compose --env-file docker/.env -f docker/docker-compose.yaml up -d

services:
  mint-ai:
    image: gogoshine/mint-ai:latest
    container_name: mint-ai
    platform: linux/amd64
    ports:
      - "30001:30000"
    environment:
      - DEBUG=true
      - LOG_LEVEL=info

      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BASE_URL=${LLM_BASE_URL}

      - FUNASR_PROVIDER=${FUNASR_PROVIDER}
      - FUNASR_API_KEY=${FUNASR_API_KEY}
      - FUNASR_API_URL=${FUNASR_API_URL}
      - FUNASR_TASK_URL=${FUNASR_TASK_URL}

      - CAPCUT_MATE_URL=http://nginx

      - WEB_ROOT_DIR=/app/html
      - WEB_ROOT_URL=http://127.0.0.1

      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
      - COS_BUCKET_NAME=${COS_BUCKET_NAME}
      - COS_REGION=${COS_REGION}

    volumes:
      - ./html:/app/html

    networks:
      - mint-ai-network

    restart: unless-stopped
    mem_limit: 8G
    memswap_limit: 8G
    cpus: "8"
    oom_score_adj: -500

  capcut-mate:
    image: gogoshine/capcut-mate:latest
    container_name: capcut-mate
    platform: linux/amd64
    ports:
      - "30002:30000"
    volumes:
      - ./html/output:/app/output
    environment:
      - DRAFT_URL=http://127.0.0.1/openapi/capcut-mate/v1/get_draft
      - DOWNLOAD_URL=http://127.0.0.1
      - TIP_URL=https://docs.jcaigc.cn
      - DOWNLOAD_FILE_SIZE_LIMIT=1073741824
    networks:
      - mint-ai-network
    mem_limit: 1G
    memswap_limit: 1G
    cpus: "1"
    oom_score_adj: -500
    restart: unless-stopped

  nginx:
    image: gogoshine/nginx:latest
    container_name: nginx
    platform: linux/amd64
    ports:
      - "80:80"
    environment:
      - LISTEN_PORT=80
      - SERVER_NAME=localhost
      - PROXY_PASS_URL_1=http://capcut-mate:30000/openapi/capcut-mate/
      - PROXY_LOCATION_1=/openapi/capcut-mate/
      - PROXY_PASS_URL_2=http://192.168.2.208:30000/openapi/capcut-mate/v1/gen_video
      - PROXY_LOCATION_2=/openapi/capcut-mate/v1/gen_video
      - PROXY_PASS_URL_3=http://192.168.3.208:30000/openapi/capcut-mate/v1/gen_video_status
      - PROXY_LOCATION_3=/openapi/capcut-mate/v1/gen_video_status
      - PROXY_PASS_URL_4=http://192.168.3.208:30000/openapi/capcut-mate/v1/gen_video_active_count
      - PROXY_LOCATION_4=/openapi/capcut-mate/v1/gen_video_active_count
      - PROXY_PASS_URL_5=http://mint-ai:30000/openapi/mint-ai/
      - PROXY_LOCATION_5=/openapi/mint-ai/
    volumes:
      - ./html:/usr/share/nginx/html
    networks:
      - mint-ai-network
    mem_limit: 1G
    memswap_limit: 1G
    cpus: "1"
    oom_score_adj: -500
    restart: unless-stopped

networks:
  mint-ai-network:
    driver: bridge
